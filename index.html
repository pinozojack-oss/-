
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKS GEKOKUJO MEDIA | 2026年 下剋上のためのキャリアと資産</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; font-family: 'Noto Sans JP', sans-serif; color: #1a1a1a; }
        .font-anton { font-family: 'Anton', sans-serif; }
        .news-border { border-bottom: 4px solid #000; }
        .tier-card { transition: all 0.2s; }
        .tier-card:hover { transform: translateX(5px); }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [investment, setInvestment] = useState(250000);
            const [monthly, setMonthly] = useState(50000);
            const [years, setYears] = useState(10);

            const calculateFinalAmount = () => {
                const r = 0.05 / 12; // 年利5%想定
                const n = years * 12;
                const compoundInterest = investment * Math.pow(1 + r, n);
                const annuity = monthly * ((Math.pow(1 + r, n) - 1) / r);
                return Math.round(compoundInterest + annuity).toLocaleString();
            };

            const articles = [
                { id: 1, category: "PRIVATE", title: "日東駒専でも学歴フィルターを貫通する『実力主義企業』リスト30選", date: "2026.03.28", img: "bg-blue-600" },
                { id: 2, category: "CIVIL SERVICE", title: "駒澤法学部生が国家一般職を目指すべき3つの理由と、霞が関のリアル", date: "2026.03.27", img: "bg-red-600" },
                { id: 3, category: "INVESTMENT", title: "【実録】元手20万円を25万円に。レンジ相場を耐え抜いた大学生のNISA記録", date: "2026.03.26", img: "bg-green-600" },
                { id: 4, category: "STRATEGY", title: "MARCH卒を30歳で抜き去る『入金力×複利』の資産逆転ロードマップ", date: "2026.03.25", img: "bg-slate-800" }
            ];

            return (
                <div className="min-h-screen">
                    {/* Top News Ticker */}
                    <div className="bg-black text-white text-[10px] py-1 px-4 overflow-hidden whitespace-nowrap">
                        <span className="inline-block animate-pulse text-red-500 mr-2 font-bold">● BREAKING:</span>
                        2026年 日経平均レンジ相場における、日東駒専生のNISA運用実績が更新されました。
                    </div>

                    {/* Navigation */}
                    <nav className="border-b border-black py-6 px-6 md:px-12 flex justify-between items-end">
                        <div className="text-4xl md:text-6xl font-anton tracking-tighter leading-none">NKS GEKOKUJO <span className="text-blue-600">MEDIA</span></div>
                        <div className="hidden md:flex space-x-6 text-[11px] font-black uppercase tracking-widest border-b-2 border-transparent">
                            <a href="#" className="hover:border-black">Home</a>
                            <a href="#" className="hover:border-black text-blue-600">Private Ranking</a>
                            <a href="#" className="hover:border-black">Civil Service</a>
                            <a href="#" className="hover:border-black">Investment</a>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-6 md:px-12 py-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
                        {/* Left Content (Articles) */}
                        <div className="lg:col-span-8">
                            <h2 className="text-2xl font-black mb-8 news-border inline-block uppercase italic">Feature Analysis</h2>
                            
                            <div className="space-y-12">
                                {articles.map(article => (
                                    <div key={article.id} className="flex flex-col md:flex-row gap-6 group cursor-pointer border-b border-slate-100 pb-8">
                                        <div className={`w-full md:w-64 aspect-video ${article.img} rounded-sm flex items-center justify-center text-white font-anton text-2xl italic opacity-80 group-hover:opacity-100 transition-opacity`}>
                                            NKS
                                        </div>
                                        <div className="flex-1">
                                            <span className="text-[10px] font-black text-blue-600 tracking-tighter uppercase">{article.category} | {article.date}</span>
                                            <h3 className="text-2xl font-black mt-2 leading-tight group-hover:text-blue-700">{article.title}</h3>
                                            <div className="mt-4 flex space-x-4">
                                                <button className="text-[11px] font-bold border border-black px-4 py-1 hover:bg-black hover:text-white transition-colors">READ FULL STORY</button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Right Content (Sidebar Tools) */}
                        <div className="lg:col-span-4 space-y-12">
                            {/* NISA Simulator Sidebar */}
                            <div className="bg-slate-50 p-6 rounded-sm border-t-4 border-black shadow-sm">
                                <h2 className="text-xl font-black mb-6 uppercase flex items-center">
                                    <span className="bg-blue-600 w-1 h-6 mr-3"></span>
                                    NISA 逆転計算機
                                </h2>
                                <div className="space-y-5">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 uppercase">Capital (元手)</label>
                                        <div className="flex items-center border-b border-slate-300">
                                            <span className="font-bold mr-2">¥</span>
                                            <input type="number" value={investment} onChange={(e) => setInvestment(Number(e.target.value))} className="w-full bg-transparent py-2 font-black text-lg focus:outline-none" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 uppercase">Monthly (毎月)</label>
                                        <div className="flex items-center border-b border-slate-300">
                                            <span className="font-bold mr-2">¥</span>
                                            <input type="number" value={monthly} onChange={(e) => setMonthly(Number(e.target.value))} className="w-full bg-transparent py-2 font-black text-lg focus:outline-none" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 uppercase">Years (年数)</label>
                                        <div className="flex items-center border-b border-slate-300">
                                            <input type="number" value={years} onChange={(e) => setYears(Number(e.target.value))} className="w-full bg-transparent py-2 font-black text-lg focus:outline-none text-right" />
                                            <span className="font-bold ml-2 text-sm">年</span>
                                        </div>
                                    </div>
                                    <div className="mt-6 pt-6 border-t-2 border-dotted border-slate-300 text-center">
                                        <p className="text-[10px] font-black text-slate-400 mb-1">想定される10年後の資産額</p>
                                        <p className="text-4xl font-anton text-blue-800 tracking-tight">¥{calculateFinalAmount()}</p>
                                    </div>
                                </div>
                            </div>

                            {/* Ranking Box */}
                            <div className="border border-black p-6">
                                <h2 className="text-xl font-black mb-6 uppercase border-b-2 border-black inline-block">TARGET TIER</h2>
                                <div className="space-y-4">
                                    <div className="tier-card flex items-center justify-between border-b border-slate-200 pb-2">
                                        <span className="font-anton text-2xl text-red-600">S</span>
                                        <span className="text-xs font-bold">国家一般職 (本府省) / 外資IT</span>
                                    </div>
                                    <div className="tier-card flex items-center justify-between border-b border-slate-200 pb-2">
                                        <span className="font-anton text-2xl text-orange-500">A</span>
                                        <span className="text-xs font-bold">サイバーエージェント / 楽天</span>
                                    </div>
                                    <div className="tier-card flex items-center justify-between border-b border-slate-200 pb-2">
                                        <span className="font-anton text-2xl text-blue-500">B</span>
                                        <span className="text-xs font-bold">特別区 (江戸川区) / 地方銀行</span>
                                    </div>
                                </div>
                                <p className="text-[9px] mt-4 text-slate-400 italic font-bold">※2026年度版ニッコマ生向け独自集計</p>
                            </div>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="border-t border-black mt-20 py-12 px-6 text-center">
                        <div className="text-4xl font-anton mb-6 tracking-tighter">NKS GEKOKUJO</div>
                        <p className="text-[10px] font-bold text-slate-500 tracking-widest uppercase">
                            © 2026 NKS MEDIA GROUP | TOKYO JAPAN | KOMAZAWA LAW STRATEGY
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
