<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKS GEKOKUJO SYSTEM | 日東駒専から資産で逆転</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; font-family: 'Noto Sans JP', sans-serif; }
        .font-anton { font-family: 'Anton', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [investment, setInvestment] = useState(250000);
            const [monthly, setMonthly] = useState(50000);
            const [years, setYears] = useState(10);

            const calculateFinalAmount = () => {
                const r = 0.05 / 12; // 年利5%
                const n = years * 12;
                const compoundInterest = investment * Math.pow(1 + r, n);
                const annuity = monthly * ((Math.pow(1 + r, n) - 1) / r);
                return Math.round(compoundInterest + annuity).toLocaleString();
            };

            return (
                <div className="min-h-screen text-white p-6 md:p-12">
                    <header className="text-center mb-16">
                        <h1 className="text-6xl md:text-8xl font-anton tracking-tighter text-blue-600 italic mb-4">NKS GEKOKUJO</h1>
                        <p className="text-lg text-slate-400 font-bold">日東駒専から資産でMARCHを抜き去る「下剋上」システム</p>
                    </header>

                    <div className="max-w-4xl mx-auto space-y-12">
                        {/* 格付けセクション */}
                        <section className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 shadow-xl">
                            <h2 className="text-2xl font-black mb-6 text-blue-400 uppercase italic">Rank: 2026年 企業格付けTier</h2>
                            <div className="space-y-3">
                                <div className="flex items-center bg-red-600/20 border-l-8 border-red-600 p-4 rounded-r">
                                    <span className="text-3xl font-anton mr-6 text-red-600">S</span>
                                    <div>
                                        <div className="font-bold">外資コンサル・五大商社・メガベンチャー</div>
                                        <div className="text-xs text-slate-400">年収 1,000万〜 / タワマン確定圏</div>
                                    </div>
                                </div>
                                <div className="flex items-center bg-orange-600/20 border-l-8 border-orange-600 p-4 rounded-r">
                                    <span className="text-3xl font-anton mr-6 text-orange-600">A</span>
                                    <div>
                                        <div className="font-bold">大手金融・国家一般職（本府省）・広告代理店</div>
                                        <div className="text-xs text-slate-400">年収 700万〜 / 上位10%の勝ち組</div>
                                    </div>
                                </div>
                                <div className="flex items-center bg-blue-600/20 border-l-8 border-blue-600 p-4 rounded-r">
                                    <span className="text-3xl font-anton mr-6 text-blue-600">B</span>
                                    <div>
                                        <div className="font-bold">日経中堅企業・地方公務員・ITエンジニア</div>
                                        <div className="text-xs text-slate-400">年収 500万〜 / 堅実な資産形成層</div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* NISAセクション */}
                        <section className="bg-gradient-to-br from-slate-800 to-blue-900 p-8 rounded-2xl border border-blue-500/50 shadow-2xl">
                            <h2 className="text-3xl font-black mb-8 text-yellow-400 italic uppercase">Reverse NISA: 逆転のシミュレーター</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Initial Capital (元手)</label>
                                    <input type="number" value={investment} onChange={(e) => setInvestment(Number(e.target.value))} className="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg text-xl font-bold focus:border-blue-500 outline-none" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Monthly Installment (毎月)</label>
                                    <input type="number" value={monthly} onChange={(e) => setMonthly(Number(e.target.value))} className="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg text-xl font-bold focus:border-blue-500 outline-none" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Years (運用年数)</label>
                                    <input type="number" value={years} onChange={(e) => setYears(Number(e.target.value))} className="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg text-xl font-bold focus:border-blue-500 outline-none" />
                                </div>
                            </div>
                            <div className="text-center p-6 bg-slate-900/50 rounded-xl border border-white/10">
                                <p className="text-sm font-bold text-slate-400 mb-2">10年後、MARCH卒の貯金額を追い越す推定資産</p>
                                <p className="text-5xl md:text-7xl font-anton text-green-400 tracking-wider">¥{calculateFinalAmount()}</p>
                                <p className="mt-4 text-xs text-slate-500 italic">※日経平均インデックス利回り年利5%を想定</p>
                            </div>
                        </section>

                        <footer className="text-center text-slate-600 text-xs py-10">
                            © 2026 NKS GEKOKUJO SYSTEM | 思考停止の学歴社会を、投資と戦略でぶち破る。
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
